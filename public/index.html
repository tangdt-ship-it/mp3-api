<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NhacCuaTui API Test UI</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #0e1b2f;
      --panel-2: #111f35;
      --border: #1d3a5f;
      --text: #e8f1ff;
      --muted: #9cb3d1;
      --cyan: #35d9ff;
      --blue: #2563eb;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(53, 217, 255, 0.14), transparent 32rem),
        linear-gradient(180deg, #050b14, var(--bg));
      color: var(--text);
    }
    h1 { margin: 0 0 6px; font-size: 24px; }
    p { margin: 0; color: var(--muted); }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card {
      background: rgba(14, 27, 47, 0.92);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-top: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }
    label { display: block; margin-bottom: 8px; color: var(--cyan); font-weight: 700; }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }
    input[type="text"] {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #2b4c75;
      background: #071426;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(53, 217, 255, 0.12); }
    button {
      min-height: 42px;
      background: var(--blue);
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { filter: brightness(1.12); }
    button.secondary { background: #16456c; }
    button.play { background: var(--green); }
    .songs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .song {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid rgba(53, 217, 255, 0.18);
    }
    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      background: #071426;
      object-fit: cover;
    }
    .title { font-weight: 800; line-height: 1.25; }
    .artist, .meta { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    audio { width: 100%; margin-top: 12px; }
    pre {
      margin: 0;
      background: #071426;
      color: #cfe7ff;
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      max-height: 42vh;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .link {
      color: var(--cyan);
      word-break: break-all;
      font-size: 13px;
      margin-top: 8px;
    }
    .error { color: var(--red); }
    @media (max-width: 640px) {
      body { padding: 14px; }
      .row { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>NhacCuaTui API Test UI</h1>
      <p>Tìm bài hát và phát trực tiếp bằng streamUrl MP3. Không dùng encodeId của Zing MP3.</p>
    </header>

    <section class="card">
      <label for="kw">Từ khóa tìm kiếm</label>
      <div class="row">
        <input id="kw" type="text" placeholder="Ví dụ: lạc trôi" autocomplete="off" />
        <button id="btnSearch">Tìm kiếm</button>
      </div>
    </section>

    <section class="card">
      <label>Kết quả</label>
      <div id="songs" class="songs"></div>
      <audio id="player" controls></audio>
      <div id="currentLink" class="link"></div>
    </section>

    <section class="card">
      <label>JSON trả về</label>
      <pre id="out">(chưa có dữ liệu)</pre>
    </section>
  </main>

  <script>
    const kw = document.getElementById('kw');
    const out = document.getElementById('out');
    const songsEl = document.getElementById('songs');
    const player = document.getElementById('player');
    const currentLink = document.getElementById('currentLink');

    function setOut(data) {
      out.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    function formatDuration(seconds) {
      const value = Number(seconds || 0);
      if (!Number.isFinite(value) || value <= 0) return '--:--';
      const m = Math.floor(value / 60);
      const s = Math.floor(value % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function playSong(song) {
      player.src = song.streamUrl;
      player.play();
      currentLink.innerHTML = `streamUrl: <a href="${song.streamUrl}" target="_blank" rel="noreferrer noopener">${song.streamUrl}</a>`;
    }

    function renderSongs(songs) {
      songsEl.innerHTML = '';
      if (!songs.length) {
        songsEl.innerHTML = '<p class="error">Không tìm được bài có streamUrl trực tiếp.</p>';
        return;
      }

      for (const song of songs) {
        const card = document.createElement('article');
        card.className = 'song';
        const image = song.thumbnail
          ? `<img class="thumb" src="${song.thumbnail}" alt="">`
          : '<div class="thumb"></div>';
        card.innerHTML = `
          ${image}
          <div>
            <div class="title"></div>
            <div class="artist"></div>
            <div class="meta">Thời lượng: ${formatDuration(song.duration)}</div>
            <div class="actions">
              <button class="play" type="button">Phát</button>
              <button class="secondary" type="button">Copy streamUrl</button>
            </div>
          </div>
        `;
        card.querySelector('.title').textContent = song.title || '(Không có tên)';
        card.querySelector('.artist').textContent = song.artist || '(Không rõ ca sĩ)';
        card.querySelector('.play').onclick = () => playSong(song);
        card.querySelector('.secondary').onclick = async () => {
          await navigator.clipboard.writeText(song.streamUrl);
          setOut({ copied: song.streamUrl });
        };
        songsEl.appendChild(card);
      }
    }

    async function search() {
      const q = kw.value.trim();
      if (!q) {
        setOut('Vui lòng nhập từ khóa');
        return;
      }

      setOut('Loading...');
      songsEl.innerHTML = '';
      currentLink.textContent = '';

      const url = new URL('/api/search', window.location.origin);
      url.searchParams.set('q', q);
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data?.detail || data?.error || `HTTP ${res.status}`);
      }

      setOut(data);
      renderSongs(Array.isArray(data.songs) ? data.songs : []);
    }

    document.getElementById('btnSearch').onclick = () => {
      search().catch((error) => {
        setOut(String(error));
        songsEl.innerHTML = `<p class="error">${String(error)}</p>`;
      });
    };
    kw.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') document.getElementById('btnSearch').click();
    });
  </script>
</body>
</html>
